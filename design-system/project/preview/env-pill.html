<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row { display:flex; gap: 12px; align-items:center; }

  <div class="pill"><span class="dot" style="background:#e0af68"></span>staging<svg viewBox="0 0 24 24" class="chev"><path d="m6 9 6 6 6-6"/></svg></div>
  <div class="pill"><span class="dot" style="background:#f97758"></span>production<svg viewBox="0 0 24 24" class="chev"><path d="m6 9 6 6 6-6"/></svg></div>
</div>
