<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row { display:flex; align-items:stretch; gap:8px; padding: 10px 12px; background:#131313; border-radius: 10px; box-shadow: inset 0 0 0 1px rgba(66,71,84,0.25); }
.field { background: transparent; border: 1px solid #484848; color: #e7e5e4; border-radius: 8px; font-family:'JetBrains Mono', monospace; font-size: 13px; box-sizing: border-box; height: 36px; display: inline-flex; align-items: center; }
.method { color:#4ae176; font-weight:700; min-width: 104px; justify-content: center; padding: 0 14px; gap: 8px; cursor: pointer; letter-spacing: 0.04em; }
.method .label { font-size: 13px; line-height: 1; }
.method svg.chev { width: 12px; height: 12px; stroke:#767575; fill:none; stroke-width:2.25; }
.url { flex: 1; padding: 0 12px; font-size: 13px; color:#acabaa; }
.send { background:#e6c188; color:#543c0e; font-family:'Inter', sans-serif; font-size: 13px; font-weight: 600; border: none; padding: 0 18px; border-radius: 8px; display:inline-flex; align-items:center; gap:6px; cursor:pointer; height: 36px; }
.send svg { width:14px; height:14px; stroke: currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.lbl { font-size: 10px; color:#767575; font-family:'JetBrains Mono', monospace; margin-top: 8px; }
</style></head><body><div class="card">
<div class="label-caps" style="margin-bottom:10px">URL bar · method + URL + Send</div>
<div class="row">
  <div class="field method">
    <span class="label">GET</span>
    <svg class="chev" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
  </div>
  <div class="field url">https://httpbin.org/get</div>
  <button class="send"><svg viewBox="0 0 24 24"><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4Z"/></svg>Send</button>
</div>
<div class="lbl">method pill and URL share 13px type · equal 36px height · method gets generous padding</div>
</div></body></html>
