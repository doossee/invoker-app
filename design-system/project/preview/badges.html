<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row { display:flex; gap: 10px; flex-wrap: wrap; align-items:center; }
.mb { font-family:'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; padding: 3px 7px; border-radius: 4px; min-width:32px; text-align:center; }
.sb { font-family:'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; }
.lbl { font-size: 10px; color:#767575; font-family:'JetBrains Mono', monospace; }
.col { display:flex; flex-direction:column; gap:4px; align-items:flex-start; }
</style></head><body><div class="card">
<div class="label-caps" style="margin-bottom:12px">Badges · methods + status</div>
<div class="row">
  <div class="col"><span class="mb" style="background:rgba(74,225,118,0.15);color:#4ae176">GET</span><span class="lbl">2xx range</span></div>
  <div class="col"><span class="mb" style="background:rgba(230,193,136,0.15);color:#e6c188">POST</span><span class="lbl">warm</span></div>
  <div class="col"><span class="mb" style="background:rgba(219,195,161,0.15);color:#dbc3a1">PUT</span><span class="lbl">tan</span></div>
  <div class="col"><span class="mb" style="background:rgba(255,205,179,0.15);color:#ffcdb3">PATCH</span><span class="lbl">peach</span></div>
  <div class="col"><span class="mb" style="background:rgba(249,119,88,0.15);color:#f97758">DEL</span><span class="lbl">3 chars</span></div>
</div>
<div class="row" style="margin-top:14px">
  <div class="col"><span class="sb" style="background:rgba(74,225,118,0.15);color:#4ae176">200</span><span class="lbl">2xx</span></div>
  <div class="col"><span class="sb" style="background:rgba(230,193,136,0.15);color:#e6c188">301</span><span class="lbl">3xx</span></div>
  <div class="col"><span class="sb" style="background:rgba(249,119,88,0.15);color:#f97758">404</span><span class="lbl">4xx/5xx</span></div>
  <div class="col"><span class="sb" style="background:rgba(249,119,88,0.15);color:#f97758">ERR</span><span class="lbl">network</span></div>
  <div class="col"><span class="sb" style="background:rgba(72,72,72,0.3);color:#acabaa;font-weight:700;letter-spacing:0.08em">MD</span><span class="lbl">md file</span></div>
</div>
</div></body></html>
