<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.sw { aspect-ratio: 1.6 / 1; border-radius: 10px; padding: 10px 12px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04); }
.sw .name { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
.sw .hex  { font-family: 'JetBrains Mono', monospace; font-size: 10px; opacity: 0.85; }
</style></head><body><div class="card">
<div class="label-caps" style="margin-bottom:10px">Surface hierarchy · 6 levels</div>
<div class="row">
  <div class="sw" style="background:#000000;color:#e7e5e4"><div class="name">Lowest</div><div class="hex">#000000</div></div>
  <div class="sw" style="background:#131313;color:#e7e5e4"><div class="name">Low</div><div class="hex">#131313</div></div>
  <div class="sw" style="background:#0e0e0e;color:#e7e5e4"><div class="name">Surface</div><div class="hex">#0e0e0e</div></div>
  <div class="sw" style="background:#191a1a;color:#e7e5e4"><div class="name">Container</div><div class="hex">#191a1a</div></div>
  <div class="sw" style="background:#1f2020;color:#e7e5e4"><div class="name">High</div><div class="hex">#1f2020</div></div>
  <div class="sw" style="background:#252626;color:#e7e5e4"><div class="name">Highest</div><div class="hex">#252626</div></div>
</div>
</div></body></html>
