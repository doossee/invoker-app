<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.input { background:#191a1a; color:#e7e5e4; font-family:'JetBrains Mono', monospace; font-size: 12px; padding: 8px 10px; border-radius: 8px; border: 1px solid #484848; width: 100%; }
.input.focus { border-color: rgba(230,193,136,0.5); outline: none; }
.input.empty::placeholder { color:#767575; }
.lbl { font-size: 10px; color:#767575; margin-top: 6px; font-family:'JetBrains Mono', monospace; }
select.input { appearance: none; text-align: center; font-weight: 500; color:#4ae176; }
</style></head><body><div class="card">
<div class="label-caps" style="margin-bottom:12px">Inputs</div>
<div class="row">
  <div><input class="input" value="https://api.example.com/users"><div class="lbl">default</div></div>
  <div><input class="input focus" value="{{baseUrl}}/auth/login"><div class="lbl">focused · primary/50</div></div>
  <div><input class="input empty" placeholder="Enter URL or paste cURL..."><div class="lbl">placeholder</div></div>
</div>
<div class="row" style="margin-top:12px">
  <div><select class="input"><option>GET</option></select><div class="lbl">method select</div></div>
  <div><input class="input" value="" style="width:auto;min-width:100%" placeholder="Key"><div class="lbl">kv · key</div></div>
  <div><input class="input" placeholder="Value"><div class="lbl">kv · value</div></div>
</div>
</div></body></html>
