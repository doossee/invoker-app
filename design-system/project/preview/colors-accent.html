<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
.sw { aspect-ratio: 1.6 / 1; border-radius: 10px; padding: 10px 12px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06); }
.sw .name { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
.sw .hex  { font-family: 'JetBrains Mono', monospace; font-size: 10px; opacity: 0.9; }
</style></head><body><div class="card">
<div class="label-caps" style="margin-bottom:10px">Accent · warm amber / gold</div>
<div class="row">
  <div class="sw" style="background:#e6c188;color:#543c0e"><div class="name">Primary</div><div class="hex">#e6c188</div></div>
  <div class="sw" style="background:#dbc3a1;color:#2b1f08"><div class="name">Secondary</div><div class="hex">#dbc3a1</div></div>
  <div class="sw" style="background:#ffcdb3;color:#3d1e0b"><div class="name">Tertiary</div><div class="hex">#ffcdb3</div></div>
  <div class="sw" style="background:#f97758;color:#3a0f05"><div class="name">Error</div><div class="hex">#f97758</div></div>
  <div class="sw" style="background:#543c0e;color:#e6c188"><div class="name">On-Primary</div><div class="hex">#543c0e</div></div>
</div>
</div></body></html>
