<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row { display: flex; gap: 14px; flex-wrap: wrap; }
.btn { font-family:'Inter', sans-serif; font-size: 12px; font-weight: 500; padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.primary   { background:#e6c188; color:#543c0e; }
.primary:hover { background: rgba(230,193,136,0.8); }
.secondary { background:#191a1a; color:#e7e5e4; box-shadow: inset 0 0 0 1px rgba(66,71,84,0.25); }
.disabled  { background: rgba(230,193,136,0.5); color:#543c0e; cursor: not-allowed; }
.ghost-btn { background: transparent; color:#acabaa; padding: 6px 10px; }
.ghost-btn:hover { color:#e7e5e4; }
svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.lbl { font-size: 10px; color:#767575; margin-top: 6px; font-family:'JetBrains Mono', monospace; }
.col { display:flex; flex-direction:column; align-items:flex-start; }
</style></head><body><div class="card">
<div class="label-caps" style="margin-bottom:12px">Buttons</div>
<div class="row">
  <div class="col"><button class="btn primary"><svg viewBox="0 0 24 24"><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4Z"/></svg>Send</button><div class="lbl">primary</div></div>
  <div class="col"><button class="btn secondary"><svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5v14"/></svg>New Request</button><div class="lbl">secondary · ghost-border</div></div>
  <div class="col"><button class="btn disabled">…</button><div class="lbl">disabled</div></div>
  <div class="col"><button class="btn ghost-btn">Manage environments</button><div class="lbl">ghost / text</div></div>
</div>
</div></body></html>
