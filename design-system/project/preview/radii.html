<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; align-items: end; }
.r { background:#0e0e0e; box-shadow: inset 0 0 0 1px rgba(66,71,84,0.25); aspect-ratio: 1/1; display:flex; align-items:center; justify-content:center; }
.r6  { border-radius: 6px; }
.r8  { border-radius: 8px; }
.r12 { border-radius: 12px; }
.r16 { border-radius: 16px; }
.rf  { border-radius: 9999px; }
.name { font-size: 11px; font-weight: 600; color:#e7e5e4; margin-top: 6px; text-align:center; }
.val { font-family:'JetBrains Mono', monospace; font-size: 10px; color:#767575; text-align:center; }
</style></head><body><div class="card">
<div class="label-caps" style="margin-bottom:14px">Corner radii</div>
<div class="row">
  <div><div class="r r6"></div><div class="name">sm</div><div class="val">6px · badges</div></div>
  <div><div class="r r8"></div><div class="name">md</div><div class="val">8px · buttons</div></div>
  <div><div class="r r12"></div><div class="name">lg</div><div class="val">12px · panels</div></div>
  <div><div class="r r16"></div><div class="name">xl</div><div class="val">16px · sidebar</div></div>
  <div><div class="r rf"></div><div class="name">full</div><div class="val">pill · dots</div></div>
</div>
</div></body></html>
